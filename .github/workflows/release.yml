name: Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish BRAT release assets
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Validate BRAT release metadata
        run: |
          VERSION="$(node -p "require('./manifest.json').version")"
          TAG="${GITHUB_REF_NAME}"

          if [ "$TAG" != "$VERSION" ]; then
            echo "Release tag '$TAG' must exactly match manifest.json version '$VERSION'."
            echo "Use tags like '0.1.0' rather than 'v0.1.0'."
            exit 1
          fi

          test -s main.js
          test -s manifest.json
          test -s styles.css

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            main.js
            manifest.json
            styles.css
